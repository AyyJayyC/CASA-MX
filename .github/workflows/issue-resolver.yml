name: OpenHands Issue Resolver

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve:
    if: |
      github.event.label.name == 'fix-me' ||
      github.event.label.name == 'fix-me-experimental' ||
      (contains(github.event.comment.body, vars.OPENHANDS_MACRO || '@openhands-agent')) ||
      (contains(github.event.review.body, vars.OPENHANDS_MACRO || '@openhands-agent'))
    runs-on: ubuntu-latest
    env:
      LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek/deepseek-v4-flash' }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install OpenHands SDK
        run: |
          uv pip install --system "openhands-sdk @ git+https://github.com/OpenHands/agent-sdk.git@main#subdirectory=openhands-sdk"
          uv pip install --system "openhands-tools @ git+https://github.com/OpenHands/agent-sdk.git@main#subdirectory=openhands-tools"

      - name: Add eyes reaction
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          gh api "repos/${{ github.repository }}/issues/$ISSUE_NUMBER/reactions" \
            --method POST --field content=eyes

      - name: Resolve issue with OpenHands
        id: resolve
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          python .github/scripts/resolve_issue.py "$ISSUE_NUMBER"
