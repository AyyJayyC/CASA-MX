name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: casamx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Backend testing
      - name: Install backend dependencies
        working-directory: ./casa-mx-backend
        run: npm ci

      - name: Run backend linting
        working-directory: ./casa-mx-backend
        run: npm run lint || echo "Linting skipped if not configured"

      - name: Setup database schema
        working-directory: ./casa-mx-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
        run: npx prisma migrate deploy

      - name: Run backend tests
        working-directory: ./casa-mx-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
        run: npm test
        
      # Frontend testing
      - name: Install frontend dependencies
        working-directory: ./casa-mx
        run: npm ci

      - name: Run frontend tests
        working-directory: ./casa-mx
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
        run: npm test -- --run

      # E2E testing (optional - uncomment if you want to run Playwright in CI)
      # - name: Install Playwright browsers
      #   working-directory: ./casa-mx
      #   run: npx playwright install --with-deps chromium

      # - name: Start backend server
      #   working-directory: ./casa-mx-backend
      #   env:
      #     DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
      #     JWT_SECRET: test-secret-key
      #     PORT: 3001
      #   run: npm start &

      # - name: Wait for backend to be ready
      #   run: |
      #     timeout 60 bash -c 'until curl -f http://localhost:3001/health; do sleep 2; done'

      # - name: Start frontend server
      #   working-directory: ./casa-mx
      #   env:
      #     NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
      #   run: npm run dev &

      # - name: Wait for frontend to be ready
      #   run: |
      #     timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'

      # - name: Run E2E tests
      #   working-directory: ./casa-mx
      #   run: npm run test:e2e:auto

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Build backend
        working-directory: ./casa-mx-backend
        run: |
          npm ci
          npm run build || echo "Build script not configured"

      - name: Build frontend
        working-directory: ./casa-mx
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
        run: |
          npm ci
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            casa-mx/.next
            casa-mx-backend/dist
          retention-days: 7
