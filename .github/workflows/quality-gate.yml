name: Quality Gate

on:
  pull_request:

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test -- --coverage

      - uses: unentropy/quality-gate@v1
        with:
          storage-type: sqlite-artifact
          quality-gate-mode: soft
          enable-pr-comment: true
