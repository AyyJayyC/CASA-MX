name: Playwright E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: casamx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: AyyJayyC/casa-mx-backend
          path: backend

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Generate Prisma + migrate backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
        run: |
          cd backend
          npx prisma generate
          npx prisma migrate deploy

      - name: Seed backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          NODE_ENV: test
        run: cd backend && npx tsx prisma/seed.ts

      - name: Start backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          NODE_ENV: test
          PORT: 3001
          FRONTEND_URL: http://localhost:3000
        run: cd backend && npx tsx src/server.ts &
        shell: bash

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3001/health && break || sleep 2
          done

      - name: Install frontend deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          CI: true
          PLAYWRIGHT_API_URL: http://localhost:3001
        run: npm run test:e2e:auto

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
